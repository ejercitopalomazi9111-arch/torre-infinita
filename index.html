<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Torre Infinita — Roguelike Pokémon</title>
  <!-- PWA: instalable en Android/iOS sin tienda de apps -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#05060a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Torre Infinita" />
  <link rel="icon" type="image/png" href="icons/favicon-64.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #05060a;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Press Start 2P', monospace;
    }
    #game {
      image-rendering: pixelated;
      box-shadow: 0 0 0 2px #1b2336, 0 12px 48px rgba(0,0,0,0.7);
    }
    canvas { image-rendering: pixelated; display: block; }
  </style>
  <script type="module" crossorigin src="./assets/index-BL-SXusF.js"></script>
</head>
<body>
  <div id="game"></div>
  <!-- Registro del Service Worker (offline + instalable). Ruta relativa = funciona en subpath.
       OJO: en DESARROLLO (localhost) NO se registra y se desregistra cualquiera existente,
       porque su caché cache-first servía bundles viejos y rompía el hot-reload / los fixes. -->
  <script>
    if ('serviceWorker' in navigator) {
      const isDev = ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname);
      if (isDev) {
        navigator.serviceWorker.getRegistrations().then((rs) => rs.forEach((r) => r.unregister()));
        if (window.caches) caches.keys().then((ks) => ks.forEach((k) => caches.delete(k)));
      } else {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW no registrado:', e));
        });
      }
    }
  </script>
</body>
</html>
